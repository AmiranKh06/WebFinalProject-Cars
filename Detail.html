<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Details — CarDealer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="detail">

  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="index.html">
        <svg class="header__logo-svg" viewBox="0 0 60 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2 30 A26 26 0 0 1 58 30" fill="none" stroke="#2a2b36" stroke-width="5" stroke-linecap="round"/>
          <path d="M2 30 A26 26 0 0 1 40 6" fill="none" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
          <line x1="30" y1="30" x2="40" y2="6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="30" r="5" fill="#e63946"/>
          <circle cx="30" cy="30" r="2" fill="#0b0c10"/>
      </svg>
        <span class="header__logo-text">CarDealer</span>
      </a>
      <nav class="header__nav">
        <a class="header__nav-link" href="index.html">Discover</a>
        <a class="header__nav-link" href="garage.html">My Garage</a>
        <a class="header__nav-link" href="profile.html">Profile</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>
  </header>

  <main class="main">

    <a class="back-link" href="index.html">← Back to results</a>

    <div class="loading" id="loading">
      <div class="loading__spinner"></div>
      <p class="loading__text">Loading car details…</p>
    </div>

    <div class="error-message" id="error-message" hidden>
      <p class="error-message__text" id="error-text"></p>
    </div>

    <article class="detail-card" id="detail-card" hidden>
      <div class="detail-card__image-wrap">
        <img class="detail-card__image" id="detail-image" src="" alt="">
        <div class="detail-card__image-placeholder" id="detail-placeholder">🚗</div>
      </div>
      <div class="detail-card__body">
        <p class="detail-card__make" id="detail-make"></p>
        <h1 class="detail-card__title" id="detail-title"></h1>
        <p class="detail-card__year" id="detail-year"></p>
        <p class="detail-card__description" id="detail-description"></p>
        <div class="detail-card__actions">
          <button class="btn btn--primary" id="detail-save-btn">+ Add to Garage</button>
          <a class="btn btn--ghost" id="detail-wiki-link" href="#" target="_blank" rel="noopener">Read on Wikipedia</a>
          <a class="btn btn--ghost" id="detail-prices-link" href="#" target="_blank" rel="noopener">🔍 Find Prices</a>
        </div>
      </div>
    </article>

  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">⬡ CarDealer</span>
      <span class="footer__note">Data by <a class="footer__link" href="https://vpic.nhtsa.dot.gov" target="_blank" rel="noopener">NHTSA</a></span>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
