<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — CarDealer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">

  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="index.html">
        <svg class="header__logo-svg" viewBox="0 0 60 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2 30 A26 26 0 0 1 58 30" fill="none" stroke="#2a2b36" stroke-width="5" stroke-linecap="round"/>
          <path d="M2 30 A26 26 0 0 1 40 6" fill="none" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
          <line x1="30" y1="30" x2="40" y2="6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="30" r="5" fill="#e63946"/>
          <circle cx="30" cy="30" r="2" fill="#0b0c10"/>
      </svg>
        <span class="header__logo-text">CarDealer</span>
      </a>
      <nav class="header__nav">
        <a class="header__nav-link" href="index.html">Discover</a>
        <a class="header__nav-link" href="garage.html">Garage</a>
        <a class="header__nav-link header__nav-link--active" href="profile.html">Profile</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>
  </header>

  <main class="main">

    <section class="page-header">
      <h1 class="page-header__title">Driver Profile</h1>
      <p class="page-header__subtitle">Create your profile to unlock the Discover and Garage pages.</p>
    </section>

    <section class="profile-section">

      <div id="account-switcher" class="account-switcher" hidden></div>

      <div id="profile-form-wrap">
      <form class="profile-form" id="profile-form" novalidate>

        <div class="form-group">
          <label class="form-group__label" for="display-name">
            Display Name <span class="form-group__required">*</span>
          </label>
          <input
            class="form-group__input"
            type="text"
            id="display-name"
            name="displayName"
            placeholder="e.g. SpeedKing"
            required
            minlength="2"
            maxlength="30"
          >
        </div>

        <div class="form-group">
          <label class="form-group__label" for="email">Email <span class="form-group__required">*</span></label>
          <input
            class="form-group__input"
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-group__label" for="birth-year">Birth Year</label>
          <input
            class="form-group__input"
            type="number"
            id="birth-year"
            name="birthYear"
            placeholder="e.g. 1995"
            min="1940"
            max="2010"
          >
        </div>

        <div class="form-group">
          <label class="form-group__label" for="preferred-type">Preferred Car Type</label>
          <select class="form-group__select" id="preferred-type" name="preferredType">
            <option value="">Select a type…</option>
            <option value="sedan">Sedan</option>
            <option value="coupe">Coupe</option>
            <option value="suv">SUV / Crossover</option>
            <option value="sports">Sports Car</option>
            <option value="truck">Truck</option>
            <option value="electric">Electric</option>
            <option value="classic">Classic / Vintage</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="brands-select">Favorite Brands</label>
          <div class="brands-picker">
            <div class="brands-picker__input-row">
              <select class="form-group__select" id="brands-select">
                <option value="">Pick a brand…</option>
                <option value="Acura">Acura</option>
                <option value="Alfa Romeo">Alfa Romeo</option>
                <option value="Aston Martin">Aston Martin</option>
                <option value="Audi">Audi</option>
                <option value="Bentley">Bentley</option>
                <option value="BMW">BMW</option>
                <option value="Bugatti">Bugatti</option>
                <option value="Buick">Buick</option>
                <option value="Cadillac">Cadillac</option>
                <option value="Chevrolet">Chevrolet</option>
                <option value="Chrysler">Chrysler</option>
                <option value="Dodge">Dodge</option>
                <option value="Ferrari">Ferrari</option>
                <option value="Fiat">Fiat</option>
                <option value="Ford">Ford</option>
                <option value="Genesis">Genesis</option>
                <option value="GMC">GMC</option>
                <option value="Honda">Honda</option>
                <option value="Hyundai">Hyundai</option>
                <option value="Infiniti">Infiniti</option>
                <option value="Jaguar">Jaguar</option>
                <option value="Jeep">Jeep</option>
                <option value="Kia">Kia</option>
                <option value="Lamborghini">Lamborghini</option>
                <option value="Land Rover">Land Rover</option>
                <option value="Lexus">Lexus</option>
                <option value="Lincoln">Lincoln</option>
                <option value="Lotus">Lotus</option>
                <option value="Maserati">Maserati</option>
                <option value="Mazda">Mazda</option>
                <option value="McLaren">McLaren</option>
                <option value="Mercedes-Benz">Mercedes-Benz</option>
                <option value="Mini">Mini</option>
                <option value="Mitsubishi">Mitsubishi</option>
                <option value="Nissan">Nissan</option>
                <option value="Pagani">Pagani</option>
                <option value="Pontiac">Pontiac</option>
                <option value="Porsche">Porsche</option>
                <option value="Ram">Ram</option>
                <option value="Rolls-Royce">Rolls-Royce</option>
                <option value="Subaru">Subaru</option>
                <option value="Tesla">Tesla</option>
                <option value="Toyota">Toyota</option>
                <option value="Volkswagen">Volkswagen</option>
                <option value="Volvo">Volvo</option>
              </select>
              <button class="btn btn--primary" type="button" id="add-brand-btn">Add</button>
            </div>
            <div class="brands-picker__tags" id="brands-tags"></div>
            <input type="hidden" name="brands" id="brands-hidden">
          </div>
        </div>

        <fieldset class="form-group form-group--fieldset">
          <legend class="form-group__label">Driving Style</legend>
          <div class="radio-group">
            <label class="radio-item">
              <input class="radio-item__input" type="radio" name="drivingStyle" value="comfort">
              <span>Comfort — smooth rides and long trips</span>
            </label>
            <label class="radio-item">
              <input class="radio-item__input" type="radio" name="drivingStyle" value="sport">
              <span>Sport — performance and handling first</span>
            </label>
            <label class="radio-item">
              <input class="radio-item__input" type="radio" name="drivingStyle" value="offroad">
              <span>Off-road — built for any terrain</span>
            </label>
            <label class="radio-item">
              <input class="radio-item__input" type="radio" name="drivingStyle" value="eco">
              <span>Eco — fuel efficiency above all</span>
            </label>
          </div>
        </fieldset>

        <div class="form-group">
          <label class="form-group__label" for="bio">About You</label>
          <textarea
            class="form-group__textarea"
            id="bio"
            name="bio"
            placeholder="Your dream car, where you like to drive, anything about your car story…"
            rows="4"
            maxlength="300"
          ></textarea>
          <span class="form-group__hint"><span id="bio-count">0</span> / 300</span>
        </div>

        <div class="form-actions">
          <button class="btn btn--primary" type="submit">Save Profile</button>
          <button class="btn btn--ghost" type="button" id="clear-btn">Clear Form</button>
          <button class="btn btn--danger" type="button" id="logout-btn" hidden>Log Out</button>
        </div>

        <div class="form-feedback" id="form-feedback" aria-live="polite"></div>
      </form>
      </div>

      <aside class="profile-preview" id="profile-preview">
        <h2 class="profile-preview__title">Saved Profile</h2>
        <div id="profile-preview-content">
          <p class="profile-preview__empty">No profile saved yet.</p>
        </div>
      </aside>

    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      
      <span class="footer__note">Data by <a class="footer__link" href="https://vpic.nhtsa.dot.gov" target="_blank" rel="noopener">NHTSA</a></span>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
