<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Garage — CarDealer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="garage">

  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="index.html">
        <svg class="header__logo-svg" viewBox="0 0 60 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2 30 A26 26 0 0 1 58 30" fill="none" stroke="#2a2b36" stroke-width="5" stroke-linecap="round"/>
          <path d="M2 30 A26 26 0 0 1 40 6" fill="none" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
          <line x1="30" y1="30" x2="40" y2="6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="30" r="5" fill="#e63946"/>
          <circle cx="30" cy="30" r="2" fill="#0b0c10"/>
      </svg>
        <span class="header__logo-text">CarDealer</span>
      </a>
      <nav class="header__nav">
        <a class="header__nav-link" href="index.html">Discover</a>
        <a class="header__nav-link header__nav-link--active" href="garage.html">My Garage</a>
        <a class="header__nav-link" href="profile.html">Profile</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>
  </header>

  <main class="main">

    <section class="page-header">
      <div class="page-header__text">
        <h1 class="page-header__title">My Garage</h1>
        <p class="page-header__count" id="garage-count">0 cars saved</p>
      </div>
    </section>

    <section class="garage-stats" id="garage-stats">
      <div class="stat-card">
        <span class="stat-card__value" id="stat-total">0</span>
        <span class="stat-card__label">Total</span>
      </div>
      <div class="stat-card stat-card--wishlist">
        <span class="stat-card__value" id="stat-wishlist">0</span>
        <span class="stat-card__label">Wishlist</span>
      </div>
      <div class="stat-card stat-card--owned">
        <span class="stat-card__value" id="stat-owned">0</span>
        <span class="stat-card__label">Owned</span>
      </div>
      <div class="stat-card stat-card--test-driven">
        <span class="stat-card__value" id="stat-test-driven">0</span>
        <span class="stat-card__label">Test Driven</span>
      </div>
    </section>

    <section class="garage-controls">
      <div class="filter-tabs" id="filter-tabs" role="tablist">
        <button class="filter-tab filter-tab--active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="filter-tab" data-filter="wishlist" role="tab" aria-selected="false">Wishlist</button>
        <button class="filter-tab" data-filter="owned" role="tab" aria-selected="false">Owned</button>
        <button class="filter-tab" data-filter="test_driven" role="tab" aria-selected="false">Test Driven</button>
      </div>
    </section>

    <section class="garage-section" id="garage-section">
      <div class="empty-state" id="empty-state">
        <p class="empty-state__icon">🚗</p>
        <p class="empty-state__title">Your garage is empty</p>
        <p class="empty-state__subtitle">
          Search for cars on the <a class="empty-state__link" href="index.html">Discover</a> page and save them here.
        </p>
      </div>
      <div class="results__grid" id="garage-grid"></div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">⬡ CarDealer</span>
      <span class="footer__note">Data by <a class="footer__link" href="https://vpic.nhtsa.dot.gov" target="_blank" rel="noopener">NHTSA</a></span>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
